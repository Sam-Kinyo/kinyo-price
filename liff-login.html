<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINYO LINE 帳號綁定</title>
    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary: #0055aa;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }

        /* 防呆視覺整合的信箱輸入框 */
        .email-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .email-wrapper:focus-within {
            border-color: var(--primary);
        }

        .email-wrapper input {
            flex: 1;
            padding: 12px 14px;
            border: none;
            outline: none;
            font-size: 16px;
            width: 100%;
            /* 防止 flex 爆框 */
            box-sizing: border-box;
        }

        .email-domain {
            padding: 12px 14px;
            background: #f8f9fa;
            color: #666;
            font-weight: bold;
            font-size: 14px;
            border-left: 1px solid #ddd;
            user-select: none;
        }

        /* 密碼輸入框 */
        .input-group>input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group>input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #004080;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            text-align: center;
            line-height: 1.5;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block !important;
            border: 1px solid #c8e6c9;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            display: block !important;
            border: 1px solid #ffcdd2;
        }

        /* 滿版覆蓋的等待層 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-weight: bold;
            font-size: 16px;
            color: var(--primary);
            flex-direction: column;
            gap: 10px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #ddd;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <div>LIFF 初始化中，請稍候...</div>
    </div>

    <div class="container">
        <h1>系統帳號綁定</h1>
        <p class="subtitle">將您的企業採購權限與 LINE 進行綁定</p>

        <!-- 視覺整合 @kinyo.com 的輸入框 -->
        <div class="input-group">
            <label>帳號前綴</label>
            <div class="email-wrapper">
                <input type="text" id="accountPrefix" placeholder="例如：kinyo" inputmode="text" autocapitalize="none">
                <div class="email-domain">@kinyo.com</div>
            </div>
        </div>

        <div class="input-group">
            <label>登入密碼</label>
            <input type="password" id="password" placeholder="請輸入您的系統密碼">
        </div>

        <button class="btn" id="bindBtn">立即綁定</button>
        <div id="status"></div>
    </div>

    <script type="module">
        // --- 1. Firebase 載入與初始化 ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        // KINYO Database Config
        const firebaseConfig = {
            apiKey: "AIzaSyDtp6rwV7KmIOedLQ9793BnXbBquopP9kM",
            authDomain: "kinyo-price.firebaseapp.com",
            projectId: "kinyo-price",
            storageBucket: "kinyo-price.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 2. 變數與函式 ---
        const LIFF_ID = "2009444751-vlA8ef2c"; // 您的真實 LIFF ID
        let lineUid = "";

        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = msg; // 支援 HTML 顯示 (如 checkbox icon)
            statusDiv.className = type;
        }

        // --- 3. 初始化 LIFF ---
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }
                const profile = await liff.getProfile();
                lineUid = profile.userId;

                // 成功取得 LINE UID 後，開放畫面
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                document.getElementById('loading').style.display = 'none';
                showStatus('⚠️ LIFF 初始化失敗。<br>請確保您是在 LINE 的內部瀏覽器開啟此連結！', 'error');
            }
        }

        // --- 4. 綁定按鈕點擊事件 ---
        document.getElementById('bindBtn').addEventListener('click', async () => {
            const bindBtn = document.getElementById('bindBtn');
            let prefix = document.getElementById('accountPrefix').value.trim();
            const password = document.getElementById('password').value;

            // 基礎表單驗證
            if (!prefix || !password) {
                showStatus('請完整輸入您的帳號前綴與密碼', 'error');
                return;
            }

            // 強制轉換為全小寫，並用正則剝去使用者意外手打的 @kinyo.com 後再合併
            prefix = prefix.toLowerCase().replace(/@kinyo\.com$/i, '');
            const fullEmail = `${prefix}@kinyo.com`;

            // 防呆：確保已被授予 lineUid 才可以寫入
            if (!lineUid) {
                showStatus('尚未取得 LINE 資訊<br>若長時間無法綁定，請嘗試重新整理頁面。', 'error');
                return;
            }

            // 狀態鎖定
            bindBtn.disabled = true;
            bindBtn.textContent = "驗證並綁定中...";
            showStatus('', '');

            try {
                // (A) 向 Firebase Auth 送出驗證
                await signInWithEmailAndPassword(auth, fullEmail, password);

                // (B) 驗證成功，準備寫入對應的 Users 集合
                // ※ 使用 fullEmail 作為文件 ID 尋找並存入資料
                const userDocRef = doc(db, "Users", fullEmail);

                // ※ 採用 { merge: true }，確保更新時不會抹除原有的 level, vipColumn 等權限資料
            await setDoc(userDocRef, {
                line_uid: lineUid
            }, { merge: true });

                showStatus('✅ <b>綁定成功！</b><br>您現在可以關閉本頁面，並返回聊天室開始查價。', 'success');

                // (C) 2 秒後自動關閉 LIFF 視窗
                setTimeout(() => {
                    if (liff.isInClient()) {
                        liff.closeWindow();
                    } else {
                        alert('綁定完成！\n網頁版測試無法觸發關閉視窗，請手動關閉。');
                        bindBtn.disabled = false;
                        bindBtn.textContent = "綁定完成";
                    }
                }, 2000);

            } catch (error) {
                console.error('登入或綁定失敗:', error);

                // 恢復按鈕
                bindBtn.disabled = false;
                bindBtn.textContent = "立即綁定";

                // Firebase 錯誤代碼處理
                let errMsg = `系統錯誤 (${error.code || '未知'})：${error.message || error}`;
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errMsg = "⚠️ 帳號或密碼錯誤，請重新確認！";
                } else if (error.code && error.code.includes('network')) {
                    errMsg = "⚠️ 網路連線錯誤，請檢查您的網路狀態。";
                }

                showStatus(errMsg, 'error');
            }
        });

        // 啟動流程
        initLiff();
    </script>
</body>

</html>
