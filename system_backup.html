<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>KINYO 查價系統（V7.6 新增到貨時間）</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- PptxGenJS for PPT export & XLSX for Excel -->
<script src="https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
/* =========================================
   Root 變數
========================================= */
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --primary:#111827;
  --primary-blue:#2563eb;
  --border:#e5e7eb;
  --text:#1f2937;
  --muted:#6b7280;
  --radius:12px;
  --shadow:0 4px 12px rgba(0,0,0,0.06);

  --loading-bg:#e5e7eb;
  --loading-fill:#3b82f6;
}

/* =========================================
   Body
========================================= */
body{
  margin:0;
  padding:24px;
  background:var(--bg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  max-width:980px;
  margin:0 auto;
}

h1{margin:0 0 4px;}
.subtitle{
  color:var(--muted);
  margin-bottom:18px;
  font-size:14px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* =========================================
   Top Bar
========================================= */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.user-badge{
  background:#eef0f4;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  transition: all 0.3s ease;
  border: 1px solid transparent;
}
.badge-lv0 { color: #666; border-color: #ddd; background: #f3f4f6; }
.badge-lv1 { background: #dbeafe; color: #1e40af; }
.badge-lv2 { background: #dcfce7; color: #15803d; }
.badge-lv3 { background: #fef3c7; color: #92400e; }
.badge-lv4 { background: #f3e8ff; color: #6b21a8; }
/* VIP Badge */
.badge-vip { background: #fce7f3; color: #be185d; border-color: #fbcfe8; }

.logout-btn{
  padding:6px 14px;
  border-radius:999px;
  border:1px solid var(--border);
  cursor:pointer;
  background:white;
  font-size:12px;
}

/* =========================================
   Toolbar
========================================= */
.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin:10px 0 6px;
  flex-wrap: wrap;
  transition: all 0.3s ease;
}
.toolbar select{ flex:1; min-width: 120px; }

/* 工具列懸浮樣式 */
.toolbar.fixed-active {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  bottom: auto;
  
  z-index: 2000;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  border: 1px solid rgba(0,0,0,0.1);
  
  width: calc(100% - 48px);
  max-width: 980px;
  border-radius: 12px;
  
  justify-content: flex-start;
  animation: popDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popDown {
  from { transform: translate(-50%, -120%); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

#toolbarSpacer { height: 70px; display: none; }

.quote-toolbar-btn{
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  font-size:14px;
  white-space:nowrap;
  display:none;
}

/* =========================================
   搜尋區塊
========================================= */
.search-box{
  background:var(--card);
  padding:18px;
  border-radius:var(--radius);
  box-shadow:0 8px 28px rgba(0,0,0,0.15);
  margin-bottom:12px;
}
.search-row {margin-bottom:14px;}
label{
  font-weight:600;
  margin-bottom:6px;
  display:block;
  font-size:14px;
}
/* 輸入框聚焦光暈特效 (新) */
input, select {
  width: 100%;
  padding: 12px 14px;       /* 稍微加大輸入區域 */
  border-radius: 8px;
  font-size: 15px;
  box-sizing: border-box;
  border: 1px solid #e2e8f0;
  background: #fff;
  transition: all 0.2s ease; /* 加入動畫過渡效果 */
}

/* 當滑鼠點擊輸入框時的效果 */
input:focus, select:focus {
  outline: none;
  border-color: #3b82f6;    /* 邊框變藍色 */
  background: #fff;
  /* 關鍵：加入擴散的藍色光暈 */
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
}

/* 複合式搜尋列 (分類 + 關鍵字) */
.combo-search {
    display: flex;
    gap: 10px;
}
.combo-search select {
    width: 35%;
    min-width: 130px;
    background-color: #f9fafb;
    border: 1px solid #cbd5e1;
}
.combo-search input {
    flex: 1;
}

/* =========================================
   Buttons
========================================= */
.btn-primary{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:999px;
  padding:12px 20px;
  font-weight:600;
  cursor:pointer;
  width:100%;
}
.btn-secondary{
  background:white;
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  white-space:nowrap;
}
.btn-secondary:disabled { color: #ccc; cursor: not-allowed; }
.btn-outline-add{
  padding:6px 12px;
  border-radius:6px;
  border:1px solid #2563eb;
  background:#eff6ff;
  color:#2563eb;
  font-size:12px;
  cursor:pointer;
  font-weight:600;
}
.btn-outline-add:hover{background:#dbeafe;}

/* =========================================
   表格
========================================= */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:var(--radius);
  box-shadow:0 8px 28px rgba(0,0,0,0.15);
}
/* 表格寬鬆化設定 (新) */
th, td {
  padding: 16px 12px;       /* 增加上下高度，讓眼睛更舒服 */
  border-bottom: 1px solid #f1f5f9; /* 改用極淡的線條 */
  font-size: 14px;
  vertical-align: middle;   /* 關鍵：讓圖片和文字垂直置中 */
}

th {
  background: #f8fafc;      /* 淺灰底色 */
  color: #64748b;           /* 深灰文字 */
  font-weight: 700;
  text-align: left;
  letter-spacing: 0.5px;    /* 字距稍微拉開 */
}

.product-img{
  width:110px;height:110px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid #e5e7eb;
  cursor: pointer;
}
.model-cell { cursor: pointer; }
.model-cell:hover { color: var(--primary-blue); text-decoration: underline; }

/* 價格標籤 - 藥丸化 */
.price-tag {
  padding: 4px 12px;        /* 增加左右寬度，讓它更像藥丸 */
  font-size: 12px;
  border-radius: 50px;      /* 關鍵：改成 50px 變成正圓弧 */
  display: inline-block;
  margin-right: 6px;
  margin-bottom: 6px;
  font-weight: 700;         /* 字體加粗 */
  white-space: nowrap;
  border: none;             /* 移除邊框，看起來更乾淨 */
  box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* 加一點點陰影 */
  transition: transform 0.2s; /* 微互動：加入動畫 */
}
.price-tag:hover {
  transform: scale(1.05);   /* 滑鼠移過去會稍微放大 */
}
.tag50{background:#dbeafe;color:#1e40af;}
.tag100{background:#e0f2fe;color:#0369a1;}
.tag300{background:#dcfce7;color:#15803d;}
.tag500{background:#ffedd5;color:#ea580c;}
.tag1000{background:#fee2e2;color:#b91c1c;}

/* 分類標籤 - 藥丸化 */
.category-badge {
  display: inline-block;
  font-size: 11px;
  padding: 3px 10px;        /* 稍微加寬 */
  background: #f1f5f9;
  color: #64748b;
  border-radius: 50px;      /* 藥丸形狀 */
  margin-bottom: 4px;
  border: 1px solid #e2e8f0;
  font-weight: 600;
}

/* 庫存文字標籤 - 藥丸化 */
.stock-tag {
  display: inline-block;
  padding: 2px 8px;         /* 加寬 */
  border-radius: 50px;      /* 藥丸形狀 */
  font-size: 11px;          /* 字體微縮，更精緻 */
  font-weight: 700;
  margin-left: 0; 
  vertical-align: middle;
  border: 1px solid transparent; /* 保持透明邊框以維持排版 */
}

/* 1. 小於 30 (紅色 - 警戒) */
.st-crit { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
/* 2. 小於 100 (橘紅 - 少量) */
.st-low  { background: #ffedd5; color: #9a3412; border-color: #fdba74; }
/* 3. 小於 400 (橘黃 - 普通) */
.st-warn { background: #fff7ed; color: #b45309; border-color: #fed7aa; }
/* 4. 小於 800 (草綠 - 充足) */
.st-mid  { background: #ecfccb; color: #3f6212; border-color: #bef264; }
/* 5. 小於 1200 (綠色 - 豐富) */
.st-good { background: #dcfce7; color: #166534; border-color: #86efac; }
/* 6. 大於 1200 (深綠 - 極多) */
.st-high { background: #ccfbf1; color: #0f766e; border-color: #5eead4; }
.st-zero { background: #374151; color: #ffffff; border-color: #1f2937; }


/* =========================================
   Loading
========================================= */
#centerLoadingBox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}
#centerLoadingCard{
  background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);
  width:280px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 8px 28px rgba(0,0,0,0.15);
}
.loading-title{
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
}
.loading-bar .fill{
  height:100%;
  width:0%;
  background:var(--loading-fill);
  transition:width .15s linear;
}

/* =========================================
   Detail Card
========================================= */
#detailCard{
  position:fixed;
  right:20px;
  top:120px;
  width:360px;
  max-height:78vh;
  overflow-y:auto;
  background:white;
  padding:18px;
  border-radius:var(--radius);
  box-shadow:0 8px 28px rgba(0,0,0,0.15);
  display:none;
  z-index:999;
}
.card-close-btn {
  position: absolute; 
  top: 12px; 
  right: 12px; 
  width: 32px; 
  height: 32px; 
  border-radius: 50%; 
  background: #f3f4f6; 
  border: 1px solid #e5e7eb;
  color: #6b7280; 
  font-size: 20px; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  z-index: 20;
  transition: all 0.2s;
}
.card-close-btn:hover {
  background: #e5e7eb;
  color: #ef4444;
  transform: scale(1.1);
}

/* =========================================
   網路圖 grid
========================================= */
.net-gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}
.net-gallery img{
  width:100%;
  border-radius:6px;
  border:1px solid #e5e7eb;
  object-fit:cover;
  cursor: pointer;
  transition: transform 0.2s;
}
.net-gallery img:hover { transform: scale(1.05); }

/* =========================================
   Mobile Sheet
========================================= */
.sheet-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.45);
  z-index:1000;
}
.sheet{
  position:fixed;left:0;right:0;bottom:0;
  height:80vh;background:#fff;
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .25s ease;
  display:flex;flex-direction:column;
  z-index:1001;
}
.sheet.open{transform:translateY(0);}
.sheet-header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  font-weight:700;
  display:flex;justify-content:space-between;align-items:center;
}
.sheet-close{
  background:none;border:none;
  font-size:26px;cursor:pointer;line-height:1;
}
.sheet-content{
  padding:16px;overflow-y:auto;font-size:15px;flex:1;
}
.hidden{display:none!important;}

.quote-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid #eee;
}
.quote-info{font-size:14px;color:#666;}
.quote-price{font-weight:700;color:#2563eb;}
.quote-del{color:#999;cursor:pointer;padding:6px;font-size:16px;}
.quote-del:hover{color:#ef4444;}

/* =========================================
   Login Overlay
========================================= */
#loginOverlay {
  position: fixed;
  inset: 0;
  background: #f5f6f8;
  z-index: 3000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.login-card {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.login-card h2 { margin-top: 0; color: var(--primary); }
.login-input {
  width: 100%;
  margin-bottom: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-sizing: border-box;
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--primary-blue);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
.login-btn:hover { background: #1d4ed8; }
.login-error {
  color: #ef4444;
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

/* =========================================
   RWD
========================================= */
@media (max-width:900px){
  #detailCard{display:none!important;}
}
/* 9. 手機版適配 (Card View) - 4欄結構專用版 */
@media (max-width: 600px) {
  body { padding: 16px; background: #f8fafc; }
  
  /* 隱藏原本的表頭 */
  thead { display: none; }
  /* 表格轉塊狀 */
  table, tbody, tr, td { display: block; width: 100%; }
  
  tr {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    /* 手機版卡片陰影 */
    box-shadow: 0 2px 8px rgba(0,0,0,0.04) !important;
    border: 1px solid rgba(0,0,0,0.03);
    position: relative;
    box-sizing: border-box;
  }
  
  /* 移除電腦版的懸浮上浮特效，手機不需要 */
  tbody tr:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

  td { border: none; padding: 4px 0; text-align: left; }
  
  /* --- 格子對應邏輯 --- */

  /* 格子1: 勾選框 (定位在左上角) */
  td:nth-of-type(1) { 
    position: absolute; top: 12px; left: 12px; width: auto; z-index: 10; 
  }
  
  /* 格子2: 型號+圖片 (置中顯示) */
  td:nth-of-type(2) { 
    display: flex; flex-direction: column; align-items: center; padding-bottom: 12px; 
  }
  /* 手機版把圖片上方的小型號隱藏，因為下面資訊欄已經有了，版面會比較清爽 */
  td:nth-of-type(2) .model-cell { display: none; } 
  .product-img { width: 100%; max-width: 200px; height: 180px; }
  
  /* 格子3: 商品資訊 (保持原樣) */
  td:nth-of-type(3) { padding-bottom: 12px; }

  /* 格子4: 價格區 (改成左右橫排，比較好讀) */
  td:nth-of-type(4) {
    background: #f8fafc; 
    padding: 10px 12px; 
    border-radius: 12px; 
    margin-top: 8px;
    display: flex; 
    justify-content: space-between; 
    align-items: center;
  }
  
  /* 用 CSS 在價格前面補上文字標籤 */
  td:nth-of-type(4) div:first-child::before { 
    content: "末售: "; 
    color: #64748b; font-weight: normal; font-size: 13px; margin-right: 4px; 
  }
  td:nth-of-type(4) div:last-child::before { 
    content: "賣場: "; 
    color: #94a3b8; font-weight: normal; font-size: 12px; margin-right: 4px;
  }
  
  /* 修復能量條在手機版的寬度 */
  .stock-bar-container { width: 100%; }
}

/* =========================================
   Preview Overlay
========================================= */
#previewOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
    display: none; align-items: center; justify-content: center; z-index: 4000;
}
.preview-card {
    background: white; width: 90%; max-width: 900px; max-height: 80vh;
    border-radius: 12px; padding: 20px; display: flex; flex-direction: column;
}
.preview-header { font-weight: bold; font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;}
.preview-body { flex: 1; overflow-y: auto; margin-bottom: 10px; font-size: 13px; }
.preview-footer { display: flex; justify-content: flex-end; gap: 10px; }
.preview-table { width: 100%; border-collapse: collapse; }
.preview-table th, .preview-table td { border: 1px solid #ddd; padding: 6px; text-align: left; }
.preview-table th { background: #f3f4f6; }
.field-badge {
    background: #e0f2fe; color: #0284c7; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px;
}

/* =========================================
   新增：庫存能量條 (Inventory Bar) 樣式
========================================= */
.stock-bar-container {
  width: 100%;             /* 讓它填滿寬度 */
  height: 6px;             /* 高度 */
  background: #e5e7eb;     /* 底色 (淺灰) */
  border-radius: 3px;      /* 圓角 */
  margin-top: 4px;         /* 與文字的間距 */
  overflow: hidden;
  position: relative;
}
.stock-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease; /* 動畫效果 */
}

/* 能量條顏色定義 */
.fill-crit { background: #ef4444; } /* 紅色 (危險) */
.fill-low  { background: #f97316; } /* 橘色 (偏低) */
.fill-mid  { background: #eab308; } /* 黃色 (普通) */
.fill-good { background: #22c55e; } /* 綠色 (充足) */
.fill-high { background: #10b981; } /* 深綠 (極多) */
.st-zero   { background: #9ca3af; } /* 灰色 (缺貨) */

/* =========================================
   LINE 按鈕專屬樣式 (強制綠色)
========================================= */
.line-share-btn {
  background-color: #06C755 !important; /* LINE 官方綠 */
  color: white !important;              /* 白字 */
  border: 1px solid #06C755 !important; /* 綠框 */
  box-shadow: 0 2px 6px rgba(6, 199, 85, 0.3) !important; /* 綠色光暈陰影 */
  transition: all 0.2s ease;
}

.line-share-btn:hover {
  background-color: #059640 !important; /* 滑鼠移過去變深綠 */
  transform: translateY(-2px);          /* 微微上浮 */
  box-shadow: 0 4px 12px rgba(6, 199, 85, 0.4) !important;
}
   
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
  <div class="login-card">
    <h2>KINYO 查價系統</h2>
    <p style="color:#666;margin-bottom:20px;">請輸入帳號密碼登入</p>
    <input type="email" id="loginEmail" class="login-input" placeholder="電子信箱">
    <input type="password" id="loginPassword" class="login-input" placeholder="密碼">
    <button id="doLoginBtn" class="login-btn">登入</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- Preview Overlay -->
<div id="previewOverlay">
    <div class="preview-card">
        <div class="preview-header" id="previewHeader">
            匯入預覽檢查
        </div>
        <div class="preview-body" id="previewContent">
            <!-- Table will be injected here -->
        </div>
        <div class="preview-footer">
            <button id="cancelImportBtn" class="btn-secondary">取消</button>
            <button id="confirmImportBtn" class="btn-primary">確認寫入資料庫</button>
        </div>
    </div>
</div>

<!-- Loading -->
<div id="centerLoadingBox">
  <div id="centerLoadingCard">
    <div class="loading-title">商品載入中...</div>
    <div id="centerLoadingBar" class="loading-bar">
      <div class="fill"></div>
    </div>
  </div>
</div>

<div class="top-bar">
  <span id="userInfo" class="user-badge">未登入</span>
  <button id="logoutBtn" class="logout-btn" style="display:none;">登出</button>
</div>

<h1>KINYO 查價系統</h1>
<div class="subtitle">
  V7.6 新增到貨時間 --- 運籌帷幄 專屬報價顧問

/* 🚀 庫存判斷邏輯 (已新增 缺貨 判斷) */
function getInventoryStatus(qty) {
  if (qty === null || qty === undefined || qty === "") return null;
  const val = parseInt(qty, 10);
  if (isNaN(val)) return null;

  // 1. 缺貨 (≤ 0) - 灰色
  if (val <= 0)    return { label: "❌ 缺貨中",    cls: "st-zero" };
  
  // 2. 危險水位 (1-29) - 紅色
  if (val < 30)    return { label: "庫存 < 30",    cls: "st-crit" };

  // 3. 低水位 (30-99) - 橘紅
  if (val < 100)   return { label: "庫存 < 100",   cls: "st-low" };

  // 4. 普通水位細分 (100-399) - 橘黃
  if (val < 200)   return { label: "庫存 < 200",   cls: "st-warn" };
  if (val < 300)   return { label: "庫存 < 300",   cls: "st-warn" };
  if (val < 400)   return { label: "庫存 < 400",   cls: "st-warn" };

  // 5. 中水位 (400-699) - 草綠
  if (val < 700)   return { label: "庫存 < 700",   cls: "st-mid" };

  // 6. 高水位細分 (700-1200) - 綠色
  if (val < 900)   return { label: "庫存 < 900",   cls: "st-good" };
  if (val <= 1200) return { label: "庫存 < 1200",  cls: "st-good" };
  
  // 7. 爆量 (> 1200) - 深綠
  return { label: "庫存 > 1200", cls: "st-high" };
}
function getInventoryRangeLabel(qty) {
    if (qty === null || qty === undefined || qty === "") return null;
    const val = parseInt(qty, 10);
    if (isNaN(val)) return null;
    if (val > 1000) return "1000個以上";
    if (val <= 100) return "100個以內";
    if (val <= 300) return "300個以內";
    if (val <= 500) return "500個以內";
    if (val <= 1000) return "1000個以內";
    return "1000個以上";
}

/* 🚀 修改版：加入能量條 (Energy Bar) 的庫存顯示 */
function renderStockByVariant(item) {
    // 1. 權限檢查
    if (userLevel < 2 && !currentUserVipConfig) return "";
    
    // 2. 資料檢查
    if (!item.variants || item.variants.length === 0) return "";
    const activeVariants = item.variants.filter(v => v.inventory !== undefined && v.inventory !== null && v.inventory !== "");
    if (activeVariants.length === 0) return "";

    let html = `<div style="display:flex; flex-direction:column; gap:6px; margin-top:6px; border-top:1px dashed #eee; padding-top:6px;">`;

    activeVariants.forEach(v => {
        const status = getInventoryStatus(v.inventory);
        if (status) {
            const qty = parseInt(v.inventory || 0);
            
            // --- 🔋 能量條計算核心 ---
            let percent = Math.min((qty / 1200) * 100, 100);
            if (qty > 0 && percent < 5) percent = 5;

            // --- 🎨 顏色判斷 (對應新的 10 階區間) ---
            let fillClass = "fill-good";
            
            if (qty <= 0)      fillClass = "st-zero";    // 0
            else if (qty < 30) fillClass = "fill-crit";  // 1-29 (紅)
            else if (qty < 100) fillClass = "fill-low";  // 30-99 (橘)
            else if (qty < 400) fillClass = "fill-mid";  // 100-399 (黃) - 將三個細分區間統合成黃色
            else if (qty < 700) fillClass = "fill-good"; // 400-699 (綠)
            else if (qty <= 1200) fillClass = "fill-high";// 700-1200 (深綠)
            else fillClass = "fill-high";                 // >1200 (深綠)

            // --- 🏷️ 標籤顯示邏輯 ---
            let colorLabel = "";
            if (activeVariants.length > 1 || (v.color && v.color !== "單一款式")) {
               colorLabel = `<span style="color:#666; margin-right:4px; font-size:12px;">${v.color}</span>`;
            }

           // 🟢 [修改開始] 設定顯示文字與樣式
            let displayLabel = status.label;
            let labelStyle = ""; 

            // 先處理 VIP (如果有設定)
            if (currentUserVipConfig) {
                if (qty >= 100) displayLabel = "庫存充足";
                else displayLabel = "庫存緊張";
            }

            // 再處理 ETA (這會覆蓋原本的文字，讓業務知道何時有貨)
          // 🟢 [修改] 只要有 ETA 資料就顯示 (不論庫存多寡)
            if (v.eta) {
                if(qty <= 0) {
                    // 情境 A：完全沒貨 -> 顯示紅字警告
                    displayLabel = `❌ 缺貨 (${v.eta} 到)`;
                    labelStyle = "color:#b91c1c; font-weight:bold;"; 
                } else {
                    // 情境 B：還有貨 (不論是少貨還是庫存充足) -> 接在原本文字後面
                    // 例如：「庫存充足 (3/1 到)」
                    displayLabel = `${displayLabel} (${v.eta} 到)`;
                    // 使用深橘色粗體，提示業務注意這筆補貨資訊
                    labelStyle = "color:#c2410c; font-weight:bold;"; 
                }
            }

            // --- 🖥️ 組合 HTML ---
            html += `
            <div style="width:100%;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1px;">
                    ${colorLabel}
                  <span class="stock-tag ${status.cls}" style="margin-left: auto; font-size:11px; padding:1px 6px; transform:scale(0.9); transform-origin:right center; ${labelStyle}">${displayLabel}</span>
                </div>
                <div class="stock-bar-container">
                    <div class="stock-bar-fill ${fillClass}" style="width: ${percent}%;"></div>
                </div>
            </div>`;
        }
    });

    html += `</div>`;
    return html;
}

function getGoogleDriveId(url) {
  if (!url) return null;
  const patterns = [
    /\/d\/([a-zA-Z0-9_-]+)/,        
    /id=([a-zA-Z0-9_-]+)/,          
    /open\?id=([a-zA-Z0-9_-]+)/      
  ];
  for (let p of patterns) {
    const m = url.match(p);
    if (m && m[1]) return m[1];
  }
  return null;
}

async function fetchAsDataURL(url) {
  if (!url) return null;
  let targetUrl = url;
  if (url.includes("drive.google.com") || url.includes("googleusercontent.com")) {
    const id = getGoogleDriveId(url);
    if (id) {
       const directLink = `https://drive.google.com/uc?id=${id}`;
       targetUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(directLink) + "&output=jpg&w=400&q=70";
    } else {
       targetUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(url) + "&output=jpg&w=400&q=70";
    }
  } else {
      if(targetUrl.includes("weserv.nl")) {
          if(!targetUrl.includes("&w=")) targetUrl += "&w=400&q=70";
      } else {
          targetUrl = "https://images.weserv.nl/?url=" + encodeURIComponent(url) + "&output=jpg&w=400&q=70";
      }
  }

  try {
    const res = await fetch(targetUrl, { mode: 'cors', credentials: 'omit' });
    if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
    const blob = await res.blob();
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn("圖片讀取失敗:", url);
    return null;
  }
}

function pickRandom(arr, count) {
  if (!Array.isArray(arr)) return [];
  const _arr = [...arr];
  for (let i = _arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [_arr[i], _arr[j]] = [_arr[j], _arr[i]];
  }
  return _arr.slice(0, count);
}

/* 🚀 新增：報價行為記錄器 (Log Quote History) - V7.3 */
async function logQuoteAction(items, sourceMode) {
    try {
        // 1. 準備基本資料
        const timestamp = new Date();
        const userEmail = currentUserEmail || "guest";
        const userName = (currentUserVipConfig && currentUserVipConfig.name) ? currentUserVipConfig.name : userEmail; 
        
        let totalAmount = 0;
        let productDetails = [];
        
        // 2. 判斷來源並計算金額
        if (sourceMode === 'quote') {
            // 來源 A: 從報價單生成 (資訊最完整)
            items.forEach(i => {
                const p = parseFloat(i.customQuoteInfo?.price || i.price || 0);
                const q = parseInt(i.count || 1);
                const subtotal = p * q;
                totalAmount += subtotal;
                
                productDetails.push({
                    model: i.model,
                    name: i.name,
                    price: p,
                    qty: q,
                    qtyLabel: i.customQuoteInfo?.qtyLabel || i.qtyLabel || "自訂",
                    subtotal: subtotal
                });
            });
        } else {
            // 來源 B: 從列表勾選生成 (預設數量 1)
            const currentTier = qtySelect.value || "50"; 
            items.forEach(i => {
                const priceKey = `quote${currentTier}`;
                let finalPrice = i[priceKey] || i.quote50 || 0;
                if(currentUserVipConfig) {
                     finalPrice = i[currentUserVipConfig.column] || 0;
                }
                const p = parseFloat(finalPrice);
                const q = 1;
                const subtotal = p * q;
                totalAmount += subtotal;

                productDetails.push({
                    model: i.model,
                    name: i.name,
                    price: p,
                    qty: q,
                    qtyLabel: `${currentTier}個(預設)`,
                    subtotal: subtotal
                });
            });
        }

        // 3. 打包資料物件
        const logData = {
            action: "generate_ppt",
            source: sourceMode,
            user: userName,
            email: userEmail,
            createdAt: timestamp,
            totalAmount: totalAmount,
            itemCount: productDetails.length,
            items: productDetails
        };

        // 4. 寫入 Firebase (QuoteHistory)
        const historyRef = collection(db, "QuoteHistory");
        // 不使用 await，讓它在背景跑，不卡住 PPT 生成
        addDoc(historyRef, logData).then(() => {
            console.log("✅ 報價紀錄已儲存 (總額: $" + totalAmount + ")");
        });

    } catch (e) {
        console.warn("⚠️ 報價紀錄寫入失敗:", e);
    }
}

async function exportQuoteHistory() {
    // 1. 安全確認
    if (!confirm("確定要匯出所有報價紀錄嗎？這可能需要一點時間。")) return;
    
    const btn = document.getElementById("exportHistoryBtn");
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "正在下載雲端數據...";

    try {
        // 2. 抓取資料 (從 Firebase 的 QuoteHistory 集合)
        // 注意：如果資料量過大，Firebase 可能會要求建立索引 (Index)，請留意 Console 訊息
        const q = collection(db, "QuoteHistory"); 
        const querySnapshot = await getDocs(q);
        
        let rows = [];
        // 3. 設定 Excel 表頭 (Header)
        rows.push(["日期", "時間", "業務/客戶", "操作來源", "整單總金額", "商品型號", "商品名稱", "數量", "報價單價", "小計"]);

            const data = doc.data();
            const dateObj = data.createdAt ? data.createdAt.toDate() : new Date();
            const dateStr = dateObj.toLocaleDateString('zh-TW');
            const timeStr = dateObj.toLocaleTimeString('zh-TW');

            // 因為一筆紀錄包含多個商品，我們要把它「攤平」成多行
            if (data.items && Array.isArray(data.items)) {
                data.items.forEach(item => {
                    rows.push([
                        dateStr,
                        timeStr,

async function getDocsWithRetry(queryRef, retries = 3, delay = 1000) {
    for (let i = 0; i < retries; i++) {
        try {
            return await getDocs(queryRef);
        } catch (err) {
            console.warn(`Attempt ${i + 1} failed. Retrying in ${delay}ms...`, err);
            if (i === retries - 1) throw err;
            await new Promise(res => setTimeout(res, delay));
        }
    }
}

function normalizeKey(key) {
    if (!key) return "";
    let base = key.split('.')[0].split('_')[0].toUpperCase();
    base = base.replace(/-/g, '');
    let m = base.match(/^([a-zA-Z]+)(\d+)([a-zA-Z]*)$/);
    if (m) { return (m[1] + m[2]); }
    return base;
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* 🚀 Updated Logic - 智慧主型號判斷 (修正 WV-KHP1230PI 合併問題) */
function getMainModel(model) {
  if (!model) return "";
  const raw = String(model).trim().toUpperCase();
  if (!raw) return "";

  // 1. 優先處理：如果有橫線且最後一段是純英文 (例如 CL-123-W)
  // 這代表最後一段肯定是顏色或後綴
  if (raw.includes("-")) {
    const parts = raw.split("-");
    const last = parts[parts.length - 1];
    // 如果最後一段是 1~3 個英文字母 (排除數字)
    if (/^[A-Z]{1,3}$/.test(last)) {
        // 切掉最後一段，例如 CL-123-W => CL-123
        return raw.substring(0, raw.lastIndexOf("-"));
    }
  }

  // 2. 次要處理：直接黏在後面的後綴 (例如 WV-KHP1230PI => WV-KHP1230)
  // 邏輯：字串結尾是 "數字" 接 "1~3個英文字"
  // Regex 解釋：
  // (.*[0-9]+)  => 前面隨便，但最後要是數字 (抓到 WV-KHP1230)
  // ([A-Z]{1,3}) => 後面接著 1~3 個大寫英文 (抓到 PI)
  const match = raw.match(/(.*[0-9]+)([A-Z]{1,3})$/);
  if (match) {
      return match[1]; // 回傳前半段 (WV-KHP1230)
  }

  // 3. 都沒對中，就回傳原始型號 (例如 CL-528)
  return raw;
}

/* 🚀 Preload Products - Plan A: Pre-calculation & Merge Logic */
async function preloadProducts() {
  showLoading();
  isProductsLoaded = false;
  isQuotesLoaded = false;

  try {
    const snap = await getDocsWithRetry(collection(db, "Products"));
    const rawList = [];

    // 1. Fetch raw data
    snap.forEach(docSnap => {
      const d = docSnap.data() || {};
      const id = docSnap.id;
      
      const model = (d.model || "").trim();
      const mainModel = getMainModel(model);
      
      let colorList = (d.colorList || "").trim();
      // 如果 colorList 空白，嘗試從型號取得後綴 (例如 CL-123W -> W)
      if (!colorList) {
        const suffix = model.toUpperCase().replace(mainModel, "").replace("-", "");
        if (suffix && /^[A-Z]{1,3}$/.test(suffix)) colorList = suffix;
      }

      // 不在這裡組 searchKey，因為等一下要合併
      const category = d.category ? String(d.category).trim() : "";
      const netSalesPermission = d.netSalesPermission ? String(d.netSalesPermission).trim() : "";
      
      rawList.push({ id, ...d, model, mainModel, colorList, category, netSalesPermission });
    });

    // 2. Perform Pre-calculation Merge (方案 A)
    const mergedMap = {};
    rawList.forEach(item => {
        // Skip inactive items from the merge (optional, but cleaner)
        if(item.status === 'inactive') return;

        const main = item.mainModel;
        
        // 建立變體物件
       const variantObj = {
    model: item.model,
    color: item.colorList || "單一款式",
    inventory: item.inventory,
    eta: item.eta  // 🟢 [新增] 把預計到貨日帶入變體資料
};

        if (!mergedMap[main]) {
            // 初始化主物件
            mergedMap[main] = { 
                ...item, 
                models: [item.model], 
                variants: [variantObj],
                // 重置 colorList，稍後累加
                colorList: item.colorList || "" 
            };
        } else {
            // 合併變體
            mergedMap[main].models.push(item.model);
            mergedMap[main].variants.push(variantObj);

            // 合併顏色字串
            const existColors = mergedMap[main].colorList.split(" / ").filter(Boolean);
            const newColors = (item.colorList || "").split(" / ").filter(Boolean);
            mergedMap[main].colorList = [...new Set([...existColors, ...newColors])].join(" / ");
            
            // 讓 inventory 欄位保持為最大值，方便排序 (可選)
            if(item.inventory && parseInt(item.inventory) > parseInt(mergedMap[main].inventory||0)) {
                mergedMap[main].inventory = item.inventory;
            }
        }
    });

    // 3. Convert map back to array & Add Search Key
    productCache = Object.values(mergedMap).map(p => {
        return {
            ...p,
            // 關鍵字搜尋要包含所有子型號
            searchKey: `${p.mainModel} ${p.models.join(' ')} ${p.name || ""} ${p.category || ""}`.toLowerCase()
        };
    });

    isProductsLoaded = true;
    isQuotesLoaded = true;
    updateCategoryOptions(); 

  } catch (e) {
    console.error(e);
    alert("商品資料載入失敗");
  }
  
  hideLoading();
}

function applySorting(list) {
  const o = sortSelect.value;
  if (o === "minPriceAsc")  return list.sort((a,b)=> (a.minPrice||0) - (b.minPrice||0));
  if (o === "minPriceDesc") return list.sort((a,b)=> (b.minPrice||0) - (a.minPrice||0));
  if (o === "marketAsc")    return list.sort((a,b)=> (a.marketPrice||0) - (b.marketPrice||0));
  if (o === "marketDesc")   return list.sort((a,b)=> (b.marketPrice||0) - (a.marketPrice||0));
  if (o === "alphaAsc")     return list.sort((a,b)=> (a.mainModel||"").localeCompare(b.mainModel||""));
  if (o === "alphaDesc")    return list.sort((a,b)=> (b.mainModel||"").localeCompare(a.mainModel||""));
  return list;
}

/* 🚀 Updated Search Logic - 移除 A 級品過濾版 */
function searchProducts() {
  // 1. 基本載入檢查
  if (!isProductsLoaded) { alert("商品資料載入中"); return; }
  
  // --- [A] 抓取與處理關鍵字 ---
  const rawInput = keywordInput.value.trim().toLowerCase();
  const keys = rawInput.split(/[\s,，\n]+/).filter(k => k.length > 0);
  const hasKey = keys.length > 0;

  // --- [B] 抓取其他搜尋條件 ---
  const qty = qtySelect.value;
  const minPraw = minPriceInput.value.trim();
  const maxPraw = maxPriceInput.value.trim();
  const cat = categorySelect.value; 
  const stockReq = stockFilter.value; 
  
  // 抓取勾選框狀態 (只剩控價品)
  const controlledCheck = document.getElementById("controlledFilter");
  const isControlledOnly = controlledCheck && controlledCheck.checked;
  
  const hasQty = !!qty;
  const hasBudget = !!minPraw || !!maxPraw;
  const hasCat = !!cat; 
  const hasStockReq = !!stockReq;

  // --- [C] 防呆判斷 ---
  
  if (hasBudget && !hasQty && userLevel >= 1) {
    alert("搜尋預算區間時，必須選擇「起訂量」！");
    return;
  }
  
  // 防呆邏輯：移除 isGradeOnly
  if (!hasKey && !hasQty && !hasBudget && !hasCat && !hasStockReq && !isControlledOnly) {
    alert("請輸入搜尋條件（關鍵字、分類、起訂量、預算、庫存或勾選篩選）");
    return;
  }

  const _needsQuote = hasQty && hasBudget;
  if (_needsQuote && !isQuotesLoaded) { alert("報價資料載入中，請稍候"); return; }

  showLoading();
  updateUserDisplay('searching');

  setTimeout(() => {
    let r = productCache;

    // --- [D] 資料過濾核心 (已移除 A 級品過濾) ---

    // 1. 勾選篩選：只看控價品
    if (isControlledOnly) {
        r = r.filter(p => p.isControlled === true);
    }

    // 2. 分類篩選
    if (hasCat) {
        r = r.filter(p => p.category === cat);
    }

    // 3. 關鍵字篩選
    if (hasKey) {
      r = r.filter(p => {
        const pKey = (p.searchKey || "");
        return keys.some(k => pKey.includes(k));
      });
    }

    // 4. 庫存篩選
    if (hasStockReq) {
        if (stockReq === 'ZERO') {
            r = r.filter(p => {
                const inv = parseInt(p.inventory || 0, 10);
                return inv <= 0;
            });
        } else {
            const minStock = parseInt(stockReq, 10);
            r = r.filter(p => {
                const inv = parseInt(p.inventory || 0, 10);
                return inv >= minStock;
            });
        }
    }

    // 5. 預算篩選
    if (hasBudget) {
      const min = minPraw ? Number(minPraw) : 0;
      const max = maxPraw ? Number(maxPraw) : Number.MAX_SAFE_INTEGER;
      r = r.filter(p => {
        let price = 0;
        if (qty) {
            const k = `quote${qty}`;
            price = Number(p[k]) || 0;
        } else {
            price = Number(p.marketPrice) || 0;
        }
        return price >= min && price <= max;
      });
    }

   // --- [E] 排序與渲染 (修改版：強制缺貨置底) ---
    
    // 1. 先將結果拆成兩堆
    const activeItems = r.filter(p => (parseInt(p.inventory || 0, 10) > 0));
    const zeroItems   = r.filter(p => (parseInt(p.inventory || 0, 10) <= 0));

    // 2. 兩堆各自進行排序 (或隨機)
    let sortedActive = [];
    let sortedZero = [];

    if (!sortSelect.value) {
        // 如果選「隨機」，兩堆各自洗牌
        sortedActive = shuffleArray(activeItems);
        sortedZero = shuffleArray(zeroItems);
    } else {
        // 如果選「價格排序」，兩堆各自排序
        sortedActive = applySorting(activeItems);
        sortedZero = applySorting(zeroItems);
    }

    // 3. 合併：有貨的在上面，缺貨的在下面
    currentResultList = [...sortedActive, ...sortedZero];
    
    renderResults(currentResultList);
    hideLoading();
    updateUserDisplay('normal');
  }, 0);
}


/* 🚀 Updated Render Logic - 列表頁圖片 (修復備用圖無法顯示問題) */
function renderResults(list) {
  resultBody.innerHTML = ""; detailCard.style.display = "none"; checkAllBox.checked = false; updateMultiLineBtnState();
  if (list.length === 0) {
    resultTable.style.display = "none"; exportBtn.disabled = true; pptToolbarBtn.disabled = true; return;

async function buildProductSlide(pptx, item, tier, customQuoteInfo) {
    const slide = pptx.addSlide();
    slide.background = { color: "FFFFFF" };

    let rawName = item.name || "未命名商品";
    let cleanName = rawName.replace(/\*.*$/, '').trim();

    const netImages = getDriveNetImages(item.model, item.mainModel) || [];
    let imagesToDisplay = [...netImages];
    const driveMain = getDriveMainImage(item.model, item.mainModel);
    const rawImg = item.imageUrl;
    
    const addUnique = (url) => {
        if(url && !imagesToDisplay.includes(url) && imagesToDisplay.length < 6) {
            imagesToDisplay.push(url);
        }
    };
    addUnique(driveMain);
    if(rawImg && rawImg.startsWith('http')) addUnique(rawImg);

    let quoteLabel = "", quotePriceStr = "";
    if (customQuoteInfo) {
        quoteLabel = `專案報價 (${customQuoteInfo.qtyLabel})`;
        quotePriceStr = `$${customQuoteInfo.price}`;
    } else {
        const quoteKey = `quote${tier}`;
        const p = item[quoteKey] || item.quote50 || "-";
        quoteLabel = `批量報價 (${tier}pcs)`;
        quotePriceStr = `$${p}`;
    }
    const marketPriceStr = `市價 $${item.marketPrice}`;

    try {
        const logoUrl = "https://drive.google.com/uc?id=1JxoU3A5qAYsE39pc2z7IMVwVS8-uTOIn"; 
        const logoB64 = await fetchAsDataURL(logoUrl);
        if(logoB64) {
            slide.addImage({ data: logoB64, x: 0.3, y: 0.2, w: 2.2, h: 0.8 }); 
        }
    } catch(e) {}

    let nameFontSize = 24; 
    if (cleanName.length > 15) nameFontSize = 20;
    if (cleanName.length > 25) nameFontSize = 16;
    if (cleanName.length > 40) nameFontSize = 14;

    slide.addText(cleanName, {
        x: 0.3, y: 1.1, w: 6.0, h: 0.7,
        fontSize: nameFontSize, 
        bold: true, 
        color: "1f2937", 
        fontFace: "微軟正黑體", 
        valign: "top"
    });

    slide.addShape(pptx.ShapeType.rect, { 
        x: 6.5, y: 0.2, w: 3.2, h: 1.5, 
        fill: { color: "f8fafc" }, 
        line: { color: "e2e8f0", width: 0.5 },
        rectRadius: 0.1 
    });

    slide.addText(quoteLabel, {
        x: 6.7, y: 0.3, w: 2.8, h: 0.3,
        fontSize: 12, color: "64748b", align: "right", fontFace: "微軟正黑體"
    });

    let priceFontSize = 36;
    if (quotePriceStr.length > 7) priceFontSize = 28;

    slide.addText(quotePriceStr, {
        x: 6.7, y: 0.55, w: 2.8, h: 0.7,
        fontSize: priceFontSize, 
        color: "dc2626", 
        bold: true, 
        align: "right", 
        fontFace: "Arial"
    });

    slide.addText(marketPriceStr, {
        x: 6.7, y: 1.25, w: 2.8, h: 0.3,
        fontSize: 11, color: "94a3b8", align: "right", fontFace: "微軟正黑體"
    });

    const startY = 1.9; 
    const pageW = 10.0; 
    const marginX = 0.25; 
    const gap = 0.1; 
    
    const cellW = (pageW - (marginX * 2) - (gap * 2)) / 3; 
    const cellH = 2.55; 

    for (let i = 0; i < 6; i++) {
        const r = Math.floor(i / 3);
        const c = i % 3;
        
        const x = marginX + c * (cellW + gap);
        const y = startY + r * (cellH + gap);

        slide.addShape(pptx.ShapeType.rect, { 
            x: x, y: y, w: cellW, h: cellH, 
            fill: { color: "ffffff" }, 
            line: { color: "e5e7eb", width: 0.5 } 
        });

        if (i < imagesToDisplay.length) {
            const url = imagesToDisplay[i];
            try {
                const b64 = await fetchAsDataURL(url);
                if(b64) {
                    slide.addImage({ 
                        data: b64, 
                        x: x + 0.05, y: y + 0.05, 
                        w: cellW - 0.1, h: cellH - 0.1, 
                        sizing: { type: "contain", w: cellW - 0.1, h: cellH - 0.1 } 
                    });
                }
            } catch(e) {
                slide.addText("Image Error", { x:x, y:y+1, w:cellW, fontSize:10, align:"center", color:"ccc" });
            }
        } else {
             slide.addText("KINYO", {
                x: x, y: y + (cellH/2) - 0.2, w: cellW, h: 0.4,
                fontSize: 14, color: "f3f4f6", align: "center", fontFace: "Arial", bold: true
            });
        }
    }

    const dateStr = new Date().toISOString().split('T')[0];
    slide.addText(`KINYO | 型號：${item.mainModel} | 報價日期：${dateStr}`, {
        x: 0.3, y: 7.1, w: 9.0, h: 0.3,
        fontSize: 9, color: "cbd5e1", fontFace: "微軟正黑體"
    });
}

async function exportSelectedPPT(source = 'checked') {
  if (typeof PptxGenJS === "undefined") { alert("PPT 模組未載入"); return; }
  
  let selectedItems = [];
  let tier = qtySelect.value || "50";
  let isFromQuoteList = false;

  if (source === 'quote') {
      if (quoteList.length === 0) { alert("報價單是空的"); return; }
      selectedItems = quoteList.map(q => {
          let fullItem = currentResultList.find(p => p.model === q.model) || productCache.find(p => p.model === q.model);
          if (!fullItem) {
               fullItem = { ...q, imageUrl: '', netImages: [] }; 
          }
          return { 
              ...fullItem, 
              customQuoteInfo: { price: q.price, qtyLabel: q.qtyLabel } 
          };
      });
      isFromQuoteList = true;
  } else {
      const checks = Array.from(document.querySelectorAll(".row-check:checked"));
      if (checks.length < 1) { alert("請至少勾選 1 個商品才能生成 PPT。"); return; }
      
      selectedItems = checks.map(cb => {
          const model = cb.dataset.model;
          let item = currentResultList.find(p => p.model === model);
          if(!item) item = currentResultList.find(p => p.mainModel === model);
          if(!item) item = currentResultList.find(p => Array.isArray(p.models) && p.models.includes(model));
          return item;
      }).filter(Boolean);
  }

  if (selectedItems.length === 0) { alert("找不到商品資料，無法生成 PPT。"); return; }

   // 🚀 V7.3 新增：觸發背景記錄
  logQuoteAction(selectedItems, source);

  const btn = source === 'quote' ? pptFromQuoteBtn : pptToolbarBtn;
  const originalText = btn.textContent;
  btn.disabled = true; 

  try {
    const CHUNK_SIZE = 20; 
    const batches = [];
    for (let i = 0; i < selectedItems.length; i += CHUNK_SIZE) {
        batches.push(selectedItems.slice(i, i + CHUNK_SIZE));
    }

    const salesName = "郭庭豪";
    const salesPhone = "0976-966333";

    for (let i = 0; i < batches.length; i++) {
        btn.textContent = `生成中 (${i + 1}/${batches.length})...`;

        const pptx = new PptxGenJS();
        pptx.layout = "LAYOUT_4x3"; 
        pptx.author = "KINYO Price System";
        pptx.company = "KINYO";
        pptx.title = `KINYO Quote`;

        const currentBatch = batches[i];
        
        await Promise.all(currentBatch.map(async (item) => {
            await buildProductSlide(pptx, item, tier, item.customQuoteInfo);
        }));
        
        let filename = `KINYO-商品推薦報價-@${salesName}-@${salesPhone}`;
        if (batches.length > 1) {
            filename += `_Part${i + 1}`;
        }
        filename += ".pptx";

        await pptx.writeFile({ fileName: filename });
    }

  } catch (e) {
    console.error(e);
    alert("PPT 生成失敗，請查看 Console。");
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

          "商品連結"
      ];

      // 4. 填入資料
      selectedModels.forEach(m => {
          const item = currentResultList.find(p => p.model === m);
          if (!item) return;

          // 準備數據
          const gbPrice = item.groupBuyPrice ? `$${item.groupBuyPrice}` : "未開放";
          const myCost = item[costCol] ? `$${item[costCol]}` : "-"; // 數據還是抓 VIP_C
          const market = item.marketPrice ? `$${item.marketPrice}` : "-";
          const stock = getInventoryRangeLabel(item.inventory) || "-";

          // 按照順序推入
          rows.push([
              item.model,           
              item.category || "",  
              item.name,            
              item.cartonQty || "", 
              gbPrice,              
              myCost,               
              market,               
              stock,                
              item.productUrl || "" 
          ]);
      });

  } 
  // ==========================================

      // 2. 價格欄位
      const qty = qtySelect.value;
      const priceHeader = qty ? [`${qty}個報價`, "末售參考", "賣場售價", "庫存狀態"] : ["末售參考", "賣場售價", "庫存狀態"];
      
      rows.push([...baseHeader, ...priceHeader]);

      selectedModels.forEach(m => {
          const item = currentResultList.find(p => p.model === m);
          if (!item) return;
          
          const driveMain = getDriveMainImage(item.model, item.mainModel);
          const driveNetList = getDriveNetImages(item.model, item.mainModel);
          const stock = getInventoryRangeLabel(item.inventory) || "-";
          const showMinPrice = userLevel >= 1;

          // 基礎資料
          const baseRow = [
              item.model, item.mainModel, item.category || "", item.name, item.colorList || "", 
              item.netSalesPermission || "", item.cartonQty || "", item.productUrl || "", 
              driveMain || "", driveNetList.join(" | ")
          ];

          // 價格資料
          let priceRow = [];
          
          let displayMin = showMinPrice ? (item.minPrice ?? "-") : "---";
          if (currentUserVipConfig && item[currentUserVipConfig.column]) {
               displayMin = "-"; 
          }

          if (qty) {
              const ck = `quote${qty}`;
              let canSeeQuote = false;
              if (userLevel >= 1 && qty == 50) canSeeQuote = true;
              if (userLevel >= 2 && (qty == 100 || qty == 300)) canSeeQuote = true;
              if (userLevel >= 3 && (qty == 500 || qty == 1000)) canSeeQuote = true;
              if (userLevel >= 4 && qty == 3000) canSeeQuote = true;

          }
          rows.push([...baseRow, ...priceRow]);
      });
  }

  // 產生檔案
  const wb = XLSX.utils.book_new();

// 🚀 V6.4 重寫的保存邏輯：即時抓取原始資料進行精準寫入
async function saveProductDataToFirestore(actions) {
    importProductBtn.disabled = true;
    importProductBtn.textContent = "正在抓取原始資料...";

    let batch = writeBatch(db);
    let opCount = 0;
    const BATCH_LIMIT = 400; 
    let successCount = 0;

    try {
        // 1. Fetch RAW docs to build Map<Barcode, ID>
        const snap = await getDocsWithRetry(collection(db, "Products"));
        const rawMap = new Map(); // Barcode -> DocID

        snap.forEach(docSnap => {
            const d = docSnap.data();
            // 這裡也加強防呆：確保資料庫原本的條碼也轉成字串
            const bc = String(d.internationalBarcode || d.barcode || "").trim();
            if(bc) rawMap.set(bc, docSnap.id);
        });

        importProductBtn.textContent = "正在寫入資料庫...";

        // 2. Process Actions using Barcode Mapping
        for(const item of actions) {
            // item.data contains the new data from Excel
            // Key logic: item.data.internationalBarcode
            
            // 👇👇👇【修正重點在這裡】加上 String() 包起來 👇👇👇
            const excelBc = String(item.data.internationalBarcode || "").trim();
            // 👆👆👆【修正結束】👆👆👆

            if(!excelBc) {
                console.warn("Skipping item without barcode:", item.model);
                continue; 
            }

            // 確保要寫入資料庫的 barcode 也是乾淨的字串
            // 確保要寫入資料庫的 barcode 也是乾淨的字串
item.data.internationalBarcode = excelBc;

// 🆕 決定狀態：如果 Excel 有讀到就用讀到的，沒有就預設 active
const finalStatus = item.data.status || 'active';

if(rawMap.has(excelBc)) {
    // Update existing doc (更新舊商品)
    const docId = rawMap.get(excelBc);
    const docRef = doc(db, "Products", docId);

    // ⚠️ 修改重點：這裡使用 finalStatus，不再強制 'active'
    batch.update(docRef, { ...item.data, status: finalStatus });

} else {
    // Create new doc (建立新商品)
    const newDocRef = doc(collection(db, "Products"));

    // ⚠️ 修改重點：這裡也使用 finalStatus
    batch.set(newDocRef, { ...item.data, status: finalStatus, inventory: 0 });
}
            
            opCount++;
            successCount++;

            if(opCount >= BATCH_LIMIT) {
                await batch.commit();
                batch = writeBatch(db);
                opCount = 0;
            }
        }

        if(opCount > 0) {
            await batch.commit();
        }

        alert(`產品總表同步完成！\n以國際條碼為基準，共處理了 ${successCount} 筆資料。\n系統將自動重新整理。`);
        window.location.reload();

    } catch(e) {

        alert("寫入資料庫時發生錯誤，請檢查 Console。");
    } finally {

// 🚀 V6.4 重寫的庫存保存邏輯：即時抓取原始資料進行精準更新
async function saveInventoryToFirestore(invMap) {
    importInventoryBtn.disabled = true;
    importInventoryBtn.textContent = "正在抓取原始資料...";
    
    let batch = writeBatch(db);
    let opCount = 0;
    let updatedCount = 0;
    const BATCH_LIMIT = 400;

    try {
         // 1. Fetch RAW docs
         const snap = await getDocsWithRetry(collection(db, "Products"));
         
         importInventoryBtn.textContent = "正在寫入資料庫...";

         // 2. Iterate Raw Docs and Match Barcode
         snap.forEach(docSnap => {
             const product = docSnap.data();
             const bc = (product.internationalBarcode || product.barcode || "").trim();
             
             if(bc && invMap.has(bc)) {
                const newQty = invMap.get(bc);
                const docRef = doc(db, "Products", docSnap.id);
                batch.update(docRef, { inventory: newQty });
                
                opCount++;
                updatedCount++;
                
                // Batch logic inside forEach needs care, usually we fill batch and check size
             }
         });
         
         // Since batch commit is async, we can't await inside forEach easily.
         // Re-implementing with for..of loop for safety
    } catch(e) {
        console.error(e);
        alert("讀取原始資料失敗");
        importInventoryBtn.disabled = false;
        importInventoryBtn.textContent = "📥 匯入庫存表 (條碼比對)";
        return;
    }

    // Re-run with clean loop structure
    try {
        const snap = await getDocsWithRetry(collection(db, "Products"));
        batch = writeBatch(db); // Reset
        opCount = 0;
        
        for(const docSnap of snap.docs) {
             const product = docSnap.data();
             const bc = (product.internationalBarcode || product.barcode || "").trim();
             
             if(bc && invMap.has(bc)) {
                const newQty = invMap.get(bc);
                const docRef = doc(db, "Products", docSnap.id);
                batch.update(docRef, { inventory: newQty });
                
                opCount++;
                updatedCount++;
                
                if(opCount >= BATCH_LIMIT) {
                    await batch.commit();
                    batch = writeBatch(db);
                    opCount = 0;
                }
             }
        }
        
        if(opCount > 0) await batch.commit();

        alert(`資料庫更新完成！\n以國際條碼為基準，共更新了 ${updatedCount} 筆商品的庫存。\n系統將自動重新整理以顯示最新數據。`);
        window.location.reload();

    } catch(e) {
        console.error(e);
        alert("寫入資料庫失敗");
    } finally {
        importInventoryBtn.disabled = false;
        importInventoryBtn.textContent = "📥 匯入庫存表 (條碼比對)";
    }
}

                let h = {

                    q50: -1, q100: -1, q300: -1, q500: -1, q1000: -1, q3000: -1,

                        const cell = String(row[c] || "").trim();
                        const cellLower = cell.toLowerCase();
                        
                        if(cellLower === 'model' || cellLower === '型號' || cellLower === '產品') h.model = c;
                        if(cellLower === 'name' || cellLower === '品名' || cellLower === '產品名稱') h.name = c;
                        if(cellLower.includes('賣場') || cellLower.includes('建議售價')) h.market = c;
                        if(cellLower.includes('末售') || cellLower.includes('底價')) h.min = c;

if (cellLower.includes('100') && !cellLower.includes('1000') && cellLower.includes('報價')) h.q100 = c;
if (cellLower.includes('300') && !cellLower.includes('3000') && cellLower.includes('報價')) h.q300 = c;
if (cellLower.includes('500') && cellLower.includes('報價')) h.q500 = c;
if (cellLower.includes('1000') && cellLower.includes('報價')) h.q1000 = c;
if (cellLower.includes('3000') && cellLower.includes('報價')) h.q3000 = c;
                        
                        // ✅ 已移除 grade 偵測
                        if (cellLower.includes('控價') || cellLower === 'controlled') h.controlled = c;

                        if(cellLower.includes('顏色')) h.color = c;
                        if(cellLower.includes('分類') || cellLower === 'category') h.cat = c;
                        if(cellLower.includes('條碼') || cellLower === 'barcode' || cellLower === '國際條碼') h.barcode = c;
                        if(cellLower.includes('箱入') || cellLower.includes('carton')) h.box = c;

                        if (cellLower.includes('網站') || cellLower.includes('網址') || cellLower.includes('url')) h.url = c;
                        if (cellLower.includes('權限') || cellLower.includes('permission')) h.perm = c;
                        if (cellLower.includes('bsmi')) h.bsmi = c;
                        if (cellLower.includes('ncc')) h.ncc = c;
                        
                        if (cellLower === '廠價' || cellLower === 'cost' || cellLower === '成本') h.cost = c;
                        
                        if (cellLower.includes('成品倉') || cellLower === '成品') h.finished = c;
                        if (cellLower.includes('專賣倉') || cellLower === '專賣') h.exclusive = c;
                        if (cellLower === '庫存' || cellLower === '現貨' || cellLower === 'inventory') h.inventory = c;
                       // 🆕 新增：偵測 "狀態", "上下架", "status"
if (cellLower.includes('狀態') || cellLower.includes('上下架') || cellLower === 'status') h.status = c;
                       // 🟢 [新增] 偵測到貨日
if (cellLower.includes('預計') || cellLower.includes('到貨') || cellLower === 'eta') h.eta = c;

                        if (cell.toUpperCase().startsWith('VIP')) {
                            vipHeaders[cell] = c;
                        }
                    }
                }

                if(h.barcode === -1) {
                    alert("⚠️ 警告：找不到「國際條碼」欄位，無法進行精準更新。");
                }

                let actions = [];
                const hasVal = (v) => v !== undefined && v !== null && String(v).trim() !== "";

                jsonData.forEach((row) => {
                    const rawModel = row[h.model];
                    if(!rawModel || String(rawModel).includes("型號")) return;

                    const modelVal = String(rawModel).trim();
                    let obj = {}; 

                    if(h.name !== -1 && hasVal(row[h.name])) obj.name = row[h.name];
                    if(h.cat !== -1 && hasVal(row[h.cat])) obj.category = row[h.cat];
                    if(h.color !== -1 && hasVal(row[h.color])) obj.colorList = row[h.color];
                    if(h.barcode !== -1 && hasVal(row[h.barcode])) obj.internationalBarcode = row[h.barcode]; 
                    if(h.box !== -1 && hasVal(row[h.box])) obj.cartonQty = row[h.box];
                    if(h.url !== -1 && hasVal(row[h.url])) obj.productUrl = row[h.url];
                    if(h.perm !== -1 && hasVal(row[h.perm])) obj.netSalesPermission = row[h.perm];
                    if(h.bsmi !== -1 && hasVal(row[h.bsmi])) obj.bsmi = row[h.bsmi];
                    if(h.ncc !== -1 && hasVal(row[h.ncc])) obj.ncc = row[h.ncc];

                    if(h.market !== -1 && hasVal(row[h.market])) obj.marketPrice = row[h.market];
                    if(h.min !== -1 && hasVal(row[h.min])) obj.minPrice = row[h.min];
                    if(h.groupBuy !== -1 && hasVal(row[h.groupBuy])) obj.groupBuyPrice = row[h.groupBuy];
                    
                    // 庫存
                    if (h.finished !== -1 && h.exclusive !== -1) {
                        const finQty = parseInt(row[h.finished] || 0, 10);
                        const excQty = parseInt(row[h.exclusive] || 0, 10);
                        obj.inventory = Math.floor((finQty + excQty) * 0.85); 
                    } else if (h.inventory !== -1 && hasVal(row[h.inventory])) {
                        obj.inventory = parseInt(row[h.inventory], 10);
                    }

                    // ═══════════════════════════════════════════════════════
                    // 📦 廠價運算 + 絕對報價欄位寫入 (Refactored V7.7)
                    // ═══════════════════════════════════════════════════════
                    // 設計原則：
                    //   1. 將「廠價 → 含稅報價」的運算結果預先寫入 Firestore，
                    //      前端讀取時直接使用，不再做動態除法運算。
                    //   2. 識別鍵值：國際條碼 (internationalBarcode)，沿用既有邏輯。
                    //   3. 既有 quote50~quote3000 報價總表邏輯完全不動。
                    // ═══════════════════════════════════════════════════════

                    let tempCost = 0;
                    if (h.cost !== -1 && hasVal(row[h.cost])) {
                        tempCost = parseFloat(row[h.cost]);
                    }

                    if (tempCost > 0) {
                        // ✅ Step 1：持久化原始廠價，方便日後稽核與反查
                        obj.cost = tempCost;

                        // ✅ Step 2：預先計算 6 個絕對含稅報價欄位
                        // 公式：Math.round((廠價 / 折數) * 1.05)
                        // 這些欄位是資料庫層面的最終值，前端不需再做任何運算
                        obj.price_76  = Math.round((tempCost / 0.76)  * 1.05);  // 50 個級距
                        obj.price_79  = Math.round((tempCost / 0.79)  * 1.05);  // 100 個級距
                        obj.price_82  = Math.round((tempCost / 0.82)  * 1.05);  // 300 個級距
                        obj.price_845 = Math.round((tempCost / 0.845) * 1.05);  // 500 個級距
                        obj.price_865 = Math.round((tempCost / 0.865) * 1.05);  // 1000 個級距
                        obj.price_89  = Math.round((tempCost / 0.89)  * 1.05);  // 3000 個級距

                        // ─── 既有報價總表邏輯 (維持不變) ───
                        // 若 Excel 沒有手動填入報價，則自動從廠價公式計算 (Math.ceil 無條件進位)
                        if (!hasVal(row[h.q50]))   obj.quote50   = Math.ceil((tempCost / 0.76) * 1.05);
                        else obj.quote50 = row[h.q50]; 
                        if (!hasVal(row[h.q100]))  obj.quote100  = Math.ceil((tempCost / 0.79) * 1.05);
                        else obj.quote100 = row[h.q100];
                        if (!hasVal(row[h.q300]))  obj.quote300  = Math.ceil((tempCost / 0.82) * 1.05);
                        else obj.quote300 = row[h.q300];
                        if (!hasVal(row[h.q500]))  obj.quote500  = Math.ceil((tempCost / 0.845) * 1.05);
                        else obj.quote500 = row[h.q500];
                        if (!hasVal(row[h.q1000])) obj.quote1000 = Math.ceil((tempCost / 0.865) * 1.05);
                        else obj.quote1000 = row[h.q1000];
                        if (!hasVal(row[h.q3000])) obj.quote3000 = Math.ceil((tempCost / 0.89) * 1.05);
                        else obj.quote3000 = row[h.q3000];
                    } else {
                        // 無廠價時，僅讀取 Excel 手動填入的報價 (報價總表模式)
                        if(hasVal(row[h.q50])) obj.quote50 = row[h.q50];
                        if(hasVal(row[h.q100])) obj.quote100 = row[h.q100];
                        if(hasVal(row[h.q300])) obj.quote300 = row[h.q300];
                        if(hasVal(row[h.q500])) obj.quote500 = row[h.q500];
                        if(hasVal(row[h.q1000])) obj.quote1000 = row[h.q1000];
                        if(hasVal(row[h.q3000])) obj.quote3000 = row[h.q3000];
                    }

                    // ✅ 已移除 grade 處理
                    if(h.controlled !== -1 && hasVal(row[h.controlled]) && String(row[h.controlled]).toLowerCase() === 'v') obj.isControlled = true;

                    for (const [vKey, vIdx] of Object.entries(vipHeaders)) {
                        if (hasVal(row[vIdx])) {
                            obj[vKey] = row[vIdx];
                        }
                    }

                    // 🆕 [開始] 新增：解析上下架狀態
    if (h.status !== -1 && hasVal(row[h.status])) {
        const rawStatus = String(row[h.status]).trim().toLowerCase();
        // 如果 Excel 填入 下架, 停售, N, 0, False，系統就標記為 inactive
        if (['下架', '停售', 'inactive', 'off', 'n', 'false', '0'].includes(rawStatus)) {
            obj.status = 'inactive';
        } else {
            obj.status = 'active';
        }
    } else {
        // 沒填寫預設為上架
        obj.status = 'active';
    }
    // 🆕 [結束]

// 🟢 [修改] 讀取 ETA 資料 (加入 Excel 日期自動轉換功能)
                    if (h.eta !== -1 && hasVal(row[h.eta])) {
                        let val = row[h.eta];
                        
                        // 偵測：如果是數字且大於 40000 (代表是 Excel 的日期格式)
                        if (typeof val === 'number' && val > 40000) {
                             // 數學公式：將 Excel 代碼轉換為人類日期
                             const date = new Date(Math.round((val - 25569) * 86400 * 1000));
                             const y = date.getFullYear();
                             const m = String(date.getMonth() + 1).padStart(2, '0'); // 自動補 0
                             const d = String(date.getDate()).padStart(2, '0');      // 自動補 0
                             obj.eta = `${y}/${m}/${d}`;
                        } else {
                             // 如果本來就是文字 (例如 "12/25")，直接用
                             obj.eta = String(val).trim();
                        }
                    }
                   
                   obj.model = modelVal;
    obj.mainModel = modelVal.split('-')[0]; 

    actions.push({ data: obj, model: modelVal });
});

                previewHeader.textContent = "全能匯入確認 (雙倉加總 + 廠價公式)";

                            <li>💰 <b>廠價運算</b>：${h.cost !== -1 ? '✅ 執行中' : '❌ 未啟用'}</li>
                            <li>🏷️ <b>產品資訊</b>：國際條碼比對中...</li>
                        </ul>
                    </div>
                `;
                pendingProductData = actions;
                previewOverlay.style.display = "flex";

            } catch(e) {
                console.error(e);
                alert("檔案讀取失敗，請檢查 Excel 格式");

    return;
  }

  if (e.target.classList.contains("line-share-btn")) {
    const model = e.target.getAttribute("data-model");
    const item  = currentResultList.find(p => p.model === model);
    if (!item) return;

    const showMinPrice = userLevel >= 1;
    const getPrice = (p) => (item[p] ?? "-");

    let costText = "";
    const currentQty = qtySelect.value; 

    if (currentQty) {
        const k = `quote${currentQty}`;
        let canSee = false;
        
        if (userLevel >= 1 && currentQty == 50) canSee = true;
        if (userLevel >= 2 && (currentQty == 100 || currentQty == 300)) canSee = true;
        if (userLevel >= 3 && (currentQty == 500 || currentQty == 1000)) canSee = true;
        
        if(canSee) {
              costText += `${currentQty}個：${getPrice(k)}\n`;
        } else {
              costText += `${currentQty}個：(無權限)\n`;
        }
    } else {
        if (userLevel >= 1) costText += `50個：${getPrice('quote50')}\n`;
        if (userLevel >= 2) costText += `100個：${getPrice('quote100')}\n300個：${getPrice('quote300')}\n`;
        if (userLevel >= 3) costText += `500個：${getPrice('quote500')}\n1000個：${getPrice('quote1000')}\n`;
    }

    const text = `【${item.model}】${item.name}
賣場售價：${getPrice('marketPrice')}
末售價格：${showMinPrice ? getPrice('minPrice') : '---'}
--------------------
採購價格：
${costText}
商品連結：${item.productUrl || "無"}`;

    navigator.clipboard.writeText(text)
      .then(() => alert("已複製到剪貼簿"))
      .catch(() => alert("複製失敗"));
  }

  const card = document.getElementById("detailCard");
  if (card && card.style.display !== "none") {
    if (!card.contains(e.target) && !e.target.closest("tr")) {
      card.style.display = "none";
    }
  }

  if(card && !card.hasAttribute("data-listeners-added")){
      card.setAttribute("data-listeners-added", "true");
      card.addEventListener("mouseenter", () => {
        if (window.hideDetailTimer) clearTimeout(window.hideDetailTimer);
      });
      card.addEventListener("mouseleave", () => {
        // 🚀 Changed from 200 to 1000
        window.hideDetailTimer = setTimeout(() => {
          card.style.display = "none";
        }, 1000);
      });
  }
});

if (batchAddQuoteBtn) {
    batchAddQuoteBtn.onclick = () => {
        const checked = document.querySelectorAll(".row-check:checked");
        if (checked.length === 0) {
            alert("請先勾選要加入候選清單的商品");
            return;
        }

        const qty = qtySelect.value || "50";
        let addedCount = 0;

        Array.from(checked).forEach(c => {
            const model = c.getAttribute("data-model");
            const item = currentResultList.find(p => p.model === model);
            if (!item) return;

            const ck = `quote${qty}`;
            const cost = item[ck] ?? item.quote50 ?? 0;
            const qtyLabel = `${qty}個`;

            const existingIndex = quoteList.findIndex(q => q.model === item.model && q.qtyLabel === qtyLabel);

            if (existingIndex > -1) {
                quoteList[existingIndex].count += 1;
            } else {
                quoteList.push({
                    model: item.model,
                    name: item.name,
                    price: cost,
                    qtyLabel: qtyLabel,
                    count: 1,
                    productUrl: item.productUrl || ""
                });
            }
            addedCount++;
        });

        updateQuoteToolbarBtn();
        alert(`已成功將 ${addedCount} 項商品加入候選清單！`);
    };
}

if (multiLineBtn) {
    multiLineBtn.onclick = () => {
        const checked = document.querySelectorAll(".row-check:checked");
        if (checked.length === 0) {
            alert("請先勾選要分享的商品");
            return;
        }

        const qty = qtySelect.value || "50";
        let text = `KINYO 多品項報價（起訂量：${qty}個）\n--------------------\n`;

        Array.from(checked).forEach((c, i) => {
            const model = c.getAttribute("data-model");
            const item = currentResultList.find(p => p.model === model);
            if (!item) return;

            const ck = `quote${qty}`;
            
            let canSeeQuote = false;
            if (userLevel >= 1 && qty == 50) canSeeQuote = true;
            if (userLevel >= 2 && (qty == 100 || qty == 300)) canSeeQuote = true;
            if (userLevel >= 3 && (qty == 500 || qty == 1000)) canSeeQuote = true;
           if (userLevel >= 4 && qty == 3000) canSeeQuote = true;

            const cost = canSeeQuote ? (item[ck] ?? item.quote50 ?? "-") : "---";
            const market = item.marketPrice ?? "-";
            const link = item.productUrl || "無連結";

            text += `${i + 1}. 【${item.model}】${item.name}\n`;
            text += `   💰 ${qty}個報價：$${cost}\n`;
            text += `   🛒 賣場售價：$${market}\n`;
            text += `   🔗 商品連結：${link}\n\n`;
        });

        text += "--------------------\n";
        text += "以上報價僅供參考，實際以最終確認為主。";

        navigator.clipboard.writeText(text)
            .then(() => alert(`已複製 ${checked.length} 項商品的報價資訊！請直接在 LINE 貼上。`))
            .catch(() => alert("複製失敗，請手動複製。"));
    };
}

if(sortSelect) {
  sortSelect.onchange = () => {
    if (currentResultList.length > 0) {
      // 1. 重新從目前的結果中拆分
      // (注意：這裡不能用 r，要用 currentResultList)
      const activeItems = currentResultList.filter(p => (parseInt(p.inventory || 0, 10) > 0));
      const zeroItems   = currentResultList.filter(p => (parseInt(p.inventory || 0, 10) <= 0));

      let sortedActive = [];
      let sortedZero = [];

      // 2. 重新排序
      if (!sortSelect.value) {
          sortedActive = shuffleArray(activeItems);
          sortedZero = shuffleArray(zeroItems);
      } else {
          // 因為 applySorting 會修改原陣列，建議用解構複製 [...array]
          sortedActive = applySorting([...activeItems]);
          sortedZero = applySorting([...zeroItems]);
      }

      // 3. 重新合併並渲染
      const finalSortedList = [...sortedActive, ...sortedZero];
      renderResults(finalSortedList);
      
      // 更新全域變數，確保下次操作一致
      currentResultList = finalSortedList;
    }
  };
}

if(sheetCloseBtn) sheetCloseBtn.onclick = closeSheet;
if(quoteCloseBtn) quoteCloseBtn.onclick = closeQuoteSheet;

if(sheetBackdrop) {
  sheetBackdrop.onclick = () => {
    if (!mobileSheet.classList.contains("hidden")) closeSheet();
    if (!quoteSheet.classList.contains("hidden")) closeQuoteSheet();
  };
}

window.addEventListener('scroll', updateToolbarScrollState);

if(quoteToolbarBtn) quoteToolbarBtn.onclick = openQuoteSheet;

// ==========================================
// 🚀 Level 4 專屬功能：一鍵設定首頁熱門榜
// ==========================================
const setHotBtn = document.getElementById("setHotBtn");
if(setHotBtn) {
    setHotBtn.onclick = async () => {
        // 再次確認權限 (雙重保險)
        if (userLevel < 4) { alert("權限不足"); return; }

        const checked = document.querySelectorAll(".row-check:checked");
        
        if (checked.length === 0) { alert("請先勾選商品！"); return; }
        if (checked.length > 6) { alert(`首頁版面限制 6 個商品，您目前勾選了 ${checked.length} 個。`); return; }

        if(!confirm(`確定要將這 ${checked.length} 個商品設為首頁「本週熱門」嗎？\n(這將覆蓋舊的名單，並立即生效)`)) return;

        setHotBtn.disabled = true;
        setHotBtn.textContent = "設定中...";

        try {
            // 動態引入 Firebase 寫入工具
            const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");

            let newHotList = [];
            let rank = 1;

            // 遍歷勾選的項目
            for(const checkbox of checked) {
                const model = checkbox.getAttribute("data-model");
                // 優先找 currentResultList (搜尋結果)，找不到找 cache
                const item = currentResultList.find(p => p.model === model) || productCache.find(p => p.model === model);
                
                if(item) {
                    newHotList.push({
                        model: item.model,
                        // 自動產生假詢價次數：第1名約180次，第6名約50次，加一點隨機感
                        count: Math.floor(180 - ((rank-1) * 25) + Math.random() * 15) 
                    });
                    rank++;
                }
            }

            // 寫入 SiteConfig (homeHotList)
            await setDoc(doc(db, "SiteConfig", "homeHotList"), {
                updatedAt: new Date(),
                items: newHotList,
                editor: currentUserEmail
            });

            alert(`✅ 設定成功！首頁熱門榜已更新。\n共 ${newHotList.length} 筆商品。`);
            
            // 清除勾選狀態
            checkAllBox.checked = false;
            checked.forEach(c => c.checked = false);
            updateMultiLineBtnState();

        } catch(e) {
            console.error("設定失敗:", e);
            alert("設定失敗：請檢查 Firebase Rules 是否允許 SiteConfig 寫入。");
        } finally {
            setHotBtn.disabled = false;
            setHotBtn.textContent = "🔥 設為首頁熱門 (L4)";
        }
    };
}
   
</script>
