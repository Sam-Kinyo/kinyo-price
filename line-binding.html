<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINYO 帳號綁定</title>
    <!-- LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1DB446;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #189a3c;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .success { background: #e8f5e9; color: #2e7d32; display: block !important; }
        .error { background: #ffebee; color: #c62828; display: block !important; }
        
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">載入中...</div>

    <div class="container">
        <h1>帳號綁定</h1>
        <p>請登入您的系統帳號，將 LINE 與報價系統進行連動，以便開始即時查價。</p>

        <div class="input-group">
            <label>電子郵件 (Email)</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>密碼 (Password)</label>
            <input type="password" id="password" placeholder="請輸入密碼">
        </div>

        <button class="btn" id="bindBtn">立即綁定並登入</button>
        <div id="status"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtp6rwV7KmIOedLQ9793BnXbBquopP9kM",
            authDomain: "kinyo-price.firebaseapp.com",
            projectId: "kinyo-price",
            storageBucket: "kinyo-price.firebasestorage.app",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const LIFF_ID = "2009444751-vlA8ef2c";
        let userLineId = "";
        let userProfileName = "";

        // 初始化 LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                userLineId = profile.userId;
                userProfileName = profile.displayName || "未知用戶"; // 修正：安全提取暱稱
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error('LIFF 初始化失敗', err);
                showStatus('LIFF 載入失敗，請確認在 LINE 內部開啟', 'error');
            }
        }

        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = type;
        }

        function closeLiffSafe() {
            if (liff.isInClient()) {
                liff.sendMessages([{
                    type: 'text',
                    text: '✅ 我已完成綁定！'
                }]).then(() => {
                    liff.closeWindow();
                }).catch((err) => {
                    console.error('送出訊息失敗', err);
                    liff.closeWindow();
                });
            } else {
                showStatus('綁定完成。若視窗未自動關閉，請手動關閉此頁面。', 'success');
            }
        }

        document.getElementById('bindBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showStatus('請完整填寫帳號與密碼', 'error');
                return;
            }

            try {
                document.getElementById('loading').style.display = 'flex';
                
                // 1. 驗證 Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                // 2. 檢查是否已經綁定 (避免重複覆蓋)
                const docRef = doc(db, "LineUsers", userLineId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    showStatus('此 LINE 帳號已經綁定過，無需重複操作！', 'success');
                    setTimeout(closeLiffSafe, 2500);
                    return;
                }

                // 3. 寫入 LineUsers 集合，進行 ID 關聯
                await setDoc(docRef, {
                    email: email.toLowerCase(),
                    linkedAt: new Date().toISOString(),
                    lineName: userProfileName
                });

                showStatus('綁定成功！即將關閉視窗...', 'success');
                setTimeout(closeLiffSafe, 2000);

            } catch (err) {
                console.error('綁定失敗', err);
                let errMsg = "發生未知的系統錯誤";
                // 修正：Firebase 新版錯誤碼對應
                if (err.code === "auth/invalid-credential" || err.code === "auth/user-not-found" || err.code === "auth/wrong-password") {
                    errMsg = "帳號或密碼錯誤，請重新嘗試";
                } else if (err.code === "permission-denied") {
                    errMsg = "資料庫寫入權限不足 (Security Rules 被阻擋)";
                }
                showStatus('失敗：' + errMsg, 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        initLiff();
    </script>
</body>
</html>
